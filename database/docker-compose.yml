services:
  postgres:
    image: postgres:16
    container_name: aipathfinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aipathfinder
      POSTGRES_USER: aipathfinder
      POSTGRES_PASSWORD: aipathfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
